<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Outline Expert - Chuẩn E-E-A-T</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .whitespace-pre-wrap { white-space: pre-wrap; word-wrap: break-word; }
        
        /* Loading animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 2s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Inline SVG Icons to prevent DOM conflicts with React
        const Icons = {
            sparkles: (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
            ),
            target: (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            ),
            send: (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            ),
            loader: (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${props.className || ''}`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            ),
            info: (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            ),
            fileText: (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
            ),
            copy: (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            ),
            check: (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            ),
            alert: (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            ),
            search: (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            )
        };

        const App = () => {
            const [primaryKeyword, setPrimaryKeyword] = useState('');
            const [secondaryKeywords, setSecondaryKeywords] = useState('');
            const [competitorOutlines, setCompetitorOutlines] = useState('');
            const [result, setResult] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [copySuccess, setCopySuccess] = useState(false);

            const apiKey = ""; // API Key từ môi trường
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'seo-outline-pro';

            const generateOutline = async () => {
                if (!primaryKeyword.trim()) {
                    setError("Vui lòng nhập từ khóa chính!");
                    return;
                }

                setLoading(true);
                setError(null);
                setResult('');

                const systemPrompt = `Bạn là một chuyên gia SEO hàng đầu với hơn 10 năm kinh nghiệm trong việc xây dựng nội dung chuẩn Google E-E-A-T và "Helpful Content". 
                Nhiệm vụ: Tạo một Outline bài viết chi tiết, logic, bao phủ đủ Search Intent (Thông tin, Giao dịch, Điều hướng). 
                Đầu ra: 1 H1 (chứa từ khóa chính), các H2 bao quát, H3 chi tiết, phần FAQ, và đề xuất các bảng/checklist giá trị.
                Tối ưu cho từ khóa chính và phủ các từ khóa phụ một cách tự nhiên.`;

                const userQuery = `
                    Từ khóa chính: ${primaryKeyword}
                    Từ khóa phụ: ${secondaryKeywords}
                    Outline đối thủ tham khảo: ${competitorOutlines}
                    
                    Yêu cầu: Hãy phân tích các đối thủ và tạo một cấu trúc vượt trội hơn, sâu sắc hơn và hữu ích hơn cho người dùng.
                `;

                const fetchWithRetry = async (retries = 0) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });

                        if (!response.ok) throw new Error('API request failed');
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (err) {
                        if (retries < 5) {
                            const delay = Math.pow(2, retries) * 1000;
                            await new Promise(res => setTimeout(res, delay));
                            return fetchWithRetry(retries + 1);
                        }
                        throw err;
                    }
                };

                try {
                    const text = await fetchWithRetry();
                    setResult(text);
                } catch (err) {
                    setError("Lỗi kết nối AI. Vui lòng kiểm tra lại API key hoặc kết nối mạng.");
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = () => {
                try {
                    const el = document.createElement('textarea');
                    el.value = result;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2000);
                } catch (err) {
                    console.error("Lỗi khi sao chép:", err);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
                    <header className="mb-8 text-center">
                        <div className="inline-flex items-center justify-center p-3 bg-blue-600 text-white rounded-2xl mb-4 shadow-lg shadow-blue-200">
                            <Icons.sparkles className="w-8 h-8" />
                        </div>
                        <h1 className="text-3xl md:text-4xl font-bold text-slate-800 mb-2">SEO Outline Expert</h1>
                        <p className="text-slate-500">Tối ưu hóa nội dung theo chuẩn E-E-A-T & Helpful Content</p>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Panel Nhập liệu */}
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <div className="flex items-center gap-2 mb-6 text-blue-600 font-semibold text-lg">
                                    <Icons.target className="w-5 h-5" />
                                    <h2>Cấu hình bài viết</h2>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Từ khóa chính</label>
                                        <input 
                                            type="text"
                                            value={primaryKeyword}
                                            onChange={(e) => setPrimaryKeyword(e.target.value)}
                                            placeholder="Ví dụ: Cách làm SEO 2024"
                                            className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Từ khóa phụ</label>
                                        <textarea 
                                            value={secondaryKeywords}
                                            onChange={(e) => setSecondaryKeywords(e.target.value)}
                                            placeholder="Mỗi từ khóa trên một dòng..."
                                            rows="3"
                                            className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Phân tích đối thủ</label>
                                        <textarea 
                                            value={competitorOutlines}
                                            onChange={(e) => setCompetitorOutlines(e.target.value)}
                                            placeholder="Dán outline của các bài top 10 để AI tìm ra 'Content Gap'..."
                                            rows="6"
                                            className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        />
                                    </div>
                                    <button
                                        onClick={generateOutline}
                                        disabled={loading}
                                        className={`w-full py-3.5 rounded-xl font-bold text-white flex items-center justify-center gap-2 shadow-md transition-all active:scale-[0.98] ${loading ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                                    >
                                        {loading ? <Icons.loader className="w-5 h-5" /> : <Icons.send className="w-5 h-5" />}
                                        {loading ? 'Đang phân tích...' : 'Tạo Outline Chiến Lược'}
                                    </button>
                                </div>
                            </div>
                            
                            <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 flex gap-4">
                                <div className="text-blue-600 shrink-0">
                                    <Icons.info className="w-6 h-6" />
                                </div>
                                <div>
                                    <h3 className="font-semibold text-blue-800 text-sm mb-1">Tại sao nên dùng AI?</h3>
                                    <p className="text-xs text-blue-700 leading-relaxed">AI sẽ giúp bạn gộp tinh hoa của 10 đối thủ hàng đầu, đồng thời phát hiện những điểm họ còn thiếu để bài viết của bạn đạt điểm "Helpful Content" cao nhất.</p>
                                </div>
                            </div>
                        </div>

                        {/* Panel Kết quả */}
                        <div className="lg:col-span-7">
                            <div className="bg-white min-h-[600px] rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                                <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                                    <div className="flex items-center gap-2 text-slate-700 font-semibold">
                                        <Icons.fileText className="w-5 h-5 text-blue-600" />
                                        <span>Outline Chi Tiết</span>
                                    </div>
                                    {result && (
                                        <button 
                                            onClick={copyToClipboard} 
                                            className="flex items-center gap-2 text-sm bg-white px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm"
                                        >
                                            {copySuccess ? <Icons.check className="w-4 h-4 text-green-500" /> : <Icons.copy className="w-4 h-4 text-slate-500" />}
                                            <span className={copySuccess ? 'text-green-600 font-medium' : 'text-slate-600'}>
                                                {copySuccess ? 'Đã sao chép' : 'Sao chép'}
                                            </span>
                                        </button>
                                    )}
                                </div>
                                <div className="p-6 overflow-y-auto flex-1">
                                    {loading ? (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-400 space-y-4 py-20">
                                            <Icons.loader className="w-12 h-12 text-blue-500" />
                                            <div className="text-center">
                                                <p className="font-medium text-slate-600">Đang nghiên cứu Search Intent...</p>
                                                <p className="text-xs text-slate-400">Quá trình này có thể mất vài giây</p>
                                            </div>
                                        </div>
                                    ) : error ? (
                                        <div className="h-full flex flex-col items-center justify-center text-red-500 py-20 space-y-3">
                                            <Icons.alert className="w-12 h-12" />
                                            <p className="font-medium">{error}</p>
                                            <button onClick={generateOutline} className="text-sm underline hover:text-red-700">Thử lại lần nữa</button>
                                        </div>
                                    ) : result ? (
                                        <div className="whitespace-pre-wrap text-slate-800 leading-loose font-medium text-sm md:text-base selection:bg-blue-100">
                                            {result}
                                        </div>
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-300 py-20 space-y-4">
                                            <div className="p-4 bg-slate-50 rounded-full">
                                                <Icons.search className="w-12 h-12" />
                                            </div>
                                            <div className="text-center">
                                                <p className="text-lg font-medium text-slate-400">Sẵn sàng phân tích</p>
                                                <p className="text-sm">Vui lòng điền thông tin bên trái để bắt đầu tạo outline.</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                    <footer className="mt-8 text-center text-slate-400 text-[10px] uppercase tracking-widest font-bold">
                        Dự án cá nhân • Tối ưu hóa cho SEO Content Creator • 2024
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
