<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Master Architect Pro - Quyền Năng Top 3 Google</title>
    <!-- Tailwind CSS cho giao diện hiện đại -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React và ReactDOM để chạy ứng dụng -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel giúp trình duyệt hiểu mã React -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Thư viện Icon Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8faff; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .gradient-text { background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-loading { animation: loading 2s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // Lưu trữ dữ liệu người dùng nhập
            const [primaryKeyword, setPrimaryKeyword] = useState('');
            const [secondaryKeywords, setSecondaryKeywords] = useState('');
            const [postType, setPostType] = useState('Blog Post');
            const [websiteUrl, setWebsiteUrl] = useState('');
            const [competitorOutlines, setCompetitorOutlines] = useState('');
            const [targetAudience, setTargetAudience] = useState('');
            
            // Trạng thái xử lý của AI
            const [isGenerating, setIsGenerating] = useState(false);
            const [generatedContent, setGeneratedContent] = useState(null);
            const [message, setMessage] = useState({ text: '', type: '' });

            const apiKey = ""; // DÁN API KEY CỦA BẠN VÀO ĐÂY

            // Tự động kích hoạt icon sau khi render
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [generatedContent, isGenerating]);

            const showMessage = (text, type = 'info') => {
                setMessage({ text, type });
                setTimeout(() => setMessage({ text: '', type: '' }), 4000);
            };

            // Hàm gọi AI với cơ chế tự động thử lại nếu lỗi mạng
            const fetchWithRetry = async (url, options, maxRetries = 3) => {
                let retries = 0;
                while (retries <= maxRetries) {
                    try {
                        const response = await fetch(url, options);
                        if (response.ok) return await response.json();
                        if (response.status === 429) {} 
                    } catch (e) {}
                    await new Promise(res => setTimeout(res, 2000));
                    retries++;
                }
                throw new Error("Không thể kết nối AI");
            };

            const handleGenerate = async () => {
                if (!primaryKeyword) return showMessage("Vui lòng nhập từ khóa chính để bắt đầu!", "error");
                
                setIsGenerating(true);
                setGeneratedContent(null);

                const systemPrompt = `Bạn là một chiến lược gia SEO bậc thầy, am hiểu thuật toán Google (E-E-A-T, Helpful Content) và GEO.
                MỤC TIÊU: Tạo ra outline bài viết XUẤT SẮC HƠN đối thủ để lọt TOP 3 Google Search.

                QUY TRÌNH TƯ DUY:
                1. Phân tích đối thủ: Phân tích cấu trúc H1-H4 từ dữ liệu người dùng dán vào. Chỉ ra điểm mạnh (để học hỏi) và điểm yếu (thông tin thiếu, trình bày kém, thiếu tính thực tế) của họ.
                2. Gộp tinh hoa: Kết hợp nội dung tốt nhất từ các bài đối thủ + bổ sung thông tin mới + Câu hỏi thường gặp (FAQ).
                3. Tối ưu Intent & Logic: Phủ kín ý định tìm kiếm (Info, Transactional, Navigational). Sắp xếp flow mượt mà, dễ đọc, có chiều sâu.
                4. Tiêu chuẩn E-E-A-T:
                   - Loại "Toplist": Phải có tiêu chí đánh giá, ưu nhược điểm từng mục, bảng so sánh.
                   - Loại "Review": Tập trung vào trải nghiệm thực tế (Experience), bằng chứng sử dụng, thông số kỹ thuật.
                   - Loại "Giá & Chi phí": Phân tích cấu thành giá, chi phí ẩn, mẹo tiết kiệm, so sánh các mức giá.
                5. Tìm Heading mới: Đề xuất các Heading ĐỘC QUYỀN mà đối thủ chưa có nhưng khách hàng cực kỳ quan tâm.

                TRẢ VỀ ĐỊNH DẠNG JSON CHÍNH XÁC:
                {
                  "seo_score": 100,
                  "analysis": "Phân tích sâu điểm mạnh/yếu của đối thủ và lý do outline này sẽ chiến thắng",
                  "content_gaps": ["Heading mới 1 - Lý do cần có", "Heading mới 2 - Lý do cần có"],
                  "meta": { "title": "SEO Title chuẩn CTR & E-E-A-T", "description": "Meta Description thu hút, chuẩn Helpful Content" },
                  "outline": [
                    { 
                      "tag": "H2/H3/H4", 
                      "text": "Tiêu đề", 
                      "notes": "Hướng dẫn viết chi tiết: cung cấp số liệu gì, chèn từ khóa nào, tại sao quan trọng cho E-E-A-T, logic dẫn dắt",
                      "subheadings": ["Tiêu đề H3/H4 con nếu có"] 
                    }
                  ],
                  "extra_value": "Mô tả checklist/bảng so sánh/ví dụ thực tế cần thêm vào bài"
                }`;

                const userQuery = `Dữ liệu bài viết:
                - Loại bài: ${postType}
                - Website: ${websiteUrl}
                - Từ khóa chính: ${primaryKeyword}
                - Từ khóa phụ: ${secondaryKeywords}
                - Đối thủ (Outline dán vào): ${competitorOutlines}
                - Độc giả: ${targetAudience}`;

                try {
                    const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    setGeneratedContent(result);
                    showMessage("Dàn ý CHIẾN THUẬT đã sẵn sàng!", "success");
                } catch (e) {
                    showMessage("Lỗi kết nối AI. Hãy kiểm tra API Key hoặc mạng.", "error");
                } finally {
                    setIsGenerating(false);
                }
            };

            const copyAll = () => {
                const text = `SEO SCORE: ${generatedContent.seo_score}\nTITLE: ${generatedContent.meta.title}\nANALYSIS: ${generatedContent.analysis}\n\nOUTLINE:\n${generatedContent.outline.map(o => `${o.tag}: ${o.text}\n- Hướng dẫn: ${o.notes}`).join('\n\n')}`;
                navigator.clipboard.writeText(text);
                showMessage("Đã sao chép toàn bộ chiến lược!", "success");
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Thông báo nổi */}
                    {message.text && (
                        <div className={`fixed top-6 right-6 z-50 px-6 py-3 rounded-2xl shadow-xl flex items-center gap-3 animate-bounce ${message.type === 'error' ? 'bg-red-500' : 'bg-indigo-600'} text-white font-bold`}>
                            <span>{message.text}</span>
                        </div>
                    )}

                    {/* Banner Tiêu đề */}
                    <div className="bg-gradient-to-br from-indigo-700 via-purple-700 to-indigo-900 pt-16 pb-32 px-6 text-center text-white relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none text-white/10">
                             <div className="absolute top-10 left-10 w-64 h-64 bg-white rounded-full blur-3xl"></div>
                             <div className="absolute bottom-10 right-10 w-96 h-96 bg-indigo-300 rounded-full blur-3xl"></div>
                        </div>
                        <h1 className="text-4xl md:text-6xl font-black mb-4 tracking-tighter uppercase relative z-10">SEO <span className="text-yellow-300 underline decoration-indigo-500 underline-offset-8">ARCHITECT</span> PRO</h1>
                        <p className="text-indigo-100 text-lg font-medium opacity-90 max-w-2xl mx-auto italic">Thống trị Top 3 Google bằng E-E-A-T, Helpful Content & Phân tích Content Gap</p>
                    </div>

                    <main className="max-w-7xl mx-auto px-6 -mt-20 grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-20">
                        {/* PHẦN NHẬP LIỆU (CỘT TRÁI) */}
                        <div className="lg:col-span-5 bg-white p-8 rounded-[2.5rem] shadow-2xl border border-white space-y-6">
                            <div className="flex items-center gap-3 border-b border-slate-100 pb-4">
                                <div className="p-3 bg-indigo-50 text-indigo-600 rounded-2xl shadow-sm"><i data-lucide="settings-2"></i></div>
                                <h2 className="text-xl font-bold text-slate-800 uppercase tracking-tight">Chiến lược nội dung</h2>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Loại bài bài viết</label>
                                    <select value={postType} onChange={e => setPostType(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400 transition-all cursor-pointer shadow-sm">
                                        <option>Blog Post</option>
                                        <option>Hướng dẫn (How-to)</option>
                                        <option>Toplist</option>
                                        <option>Review chi tiết</option>
                                        <option>Giá và Chi phí</option>
                                        <option>So sánh (Comparison)</option>
                                        <option>Vấn đề và Giải pháp</option>
                                        <option>Cẩm nang toàn tập</option>
                                    </select>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Website Đích/URL</label>
                                    <input type="text" value={websiteUrl} onChange={e => setWebsiteUrl(e.target.value)} placeholder="mywebsite.com" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 font-medium shadow-sm"/>
                                </div>
                            </div>

                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Từ khóa chính (Primary)</label>
                                <input type="text" value={primaryKeyword} onChange={e => setPrimaryKeyword(e.target.value)} placeholder="Ví dụ: Review iPhone 15 Pro Max" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-indigo-900 border-2 border-transparent focus:border-indigo-400 outline-none shadow-sm"/>
                            </div>

                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Từ khóa phụ (LSI / Secondary)</label>
                                <textarea rows="2" value={secondaryKeywords} onChange={e => setSecondaryKeywords(e.target.value)} placeholder="Mỗi từ khóa 1 dòng..." className="w-full p-4 bg-slate-50 rounded-2xl text-sm resize-none font-medium shadow-sm"></textarea>
                            </div>

                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-1 flex items-center gap-2">Outline đối thủ <span className="bg-rose-100 text-rose-500 px-2 py-0.5 rounded-md text-[9px]">Quan trọng</span></label>
                                <textarea rows="5" value={competitorOutlines} onChange={e => setCompetitorOutlines(e.target.value)} placeholder="Dán các tiêu đề H2, H3 của Top 3 đối thủ vào đây..." className="w-full p-4 bg-slate-50 rounded-2xl text-xs font-mono shadow-sm"></textarea>
                            </div>

                            <button onClick={handleGenerate} disabled={isGenerating} className="w-full py-5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-black rounded-3xl shadow-xl transition-all transform active:scale-95 disabled:opacity-50 flex items-center justify-center gap-3">
                                {isGenerating ? (
                                    <><i data-lucide="loader-2" className="animate-spin"></i> ĐANG PHÂN TÍCH ĐỐI THỦ...</>
                                ) : (
                                    <><i data-lucide="zap" className="fill-current"></i> XUẤT DÀN Ý TOP 3</>
                                )}
                            </button>
                        </div>

                        {/* PHẦN KẾT QUẢ (CỘT PHẢI) */}
                        <div className="lg:col-span-7">
                            {!generatedContent ? (
                                <div className="h-full min-h-[500px] bg-white/60 border-4 border-dashed border-white rounded-[3rem] flex flex-col items-center justify-center text-center p-12">
                                    <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center mb-6 shadow-xl text-indigo-200">
                                        <i data-lucide="bar-chart-3" size={48}></i>
                                    </div>
                                    <h3 className="text-2xl font-black text-indigo-950 mb-2 uppercase tracking-tighter">Hệ thống Intelligence</h3>
                                    <p className="text-slate-500 max-w-sm font-medium">Nhập thông tin bên trái để AI tiến hành soi đối thủ và xây dựng cấu trúc bài viết có chiều sâu vượt trội.</p>
                                </div>
                            ) : (
                                <div className="space-y-6 animate-in fade-in zoom-in duration-500 pb-10">
                                    {/* SEO Score & Content Gap Analysis */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-white p-8 rounded-[2.5rem] shadow-xl flex items-center gap-6 border border-indigo-50 relative overflow-hidden group">
                                            <div className="absolute inset-0 bg-emerald-500/5 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                                            <div className="text-5xl font-black text-emerald-500 tracking-tighter italic relative z-10">{generatedContent.seo_score}</div>
                                            <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none relative z-10">Winning Chance<br/><span className="text-emerald-500 font-black">Khả năng thắng Top 3</span></div>
                                        </div>
                                        <div className="bg-indigo-950 p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
                                            <div className="absolute -right-10 -bottom-10 w-32 h-32 bg-white/5 rounded-full blur-2xl"></div>
                                            <h4 className="text-yellow-400 font-black text-[10px] uppercase mb-3 flex items-center gap-2 italic relative z-10">
                                                <i data-lucide="award" size={14}></i> Content Gap (Heading mới) ✨
                                            </h4>
                                            <div className="space-y-2 relative z-10">
                                                {generatedContent.content_gaps.map((gap, i) => (
                                                    <div key={i} className="text-[11px] font-bold text-indigo-100 flex gap-2"><span>•</span> {gap}</div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Phân tích đối thủ chuyên sâu */}
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-indigo-50">
                                        <h4 className="text-[10px] font-black text-indigo-600 uppercase mb-3 flex items-center gap-2"><i data-lucide="microscope" size={12}></i> Phân tích lỗ hổng đối thủ</h4>
                                        <p className="text-[13px] text-slate-700 font-medium leading-relaxed italic border-l-4 border-slate-100 pl-4">
                                            "{generatedContent.analysis}"
                                        </p>
                                    </div>

                                    {/* Detailed Strategy */}
                                    <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-indigo-50">
                                        <div className="p-8 bg-slate-50/80 border-b border-slate-100 flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><i data-lucide="file-text"></i></div>
                                                <h3 className="font-black text-xl text-slate-900 uppercase tracking-tighter">Content Blueprint</h3>
                                            </div>
                                            <button onClick={copyAll} className="px-6 py-3 bg-white hover:bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs font-black flex items-center gap-2 shadow-sm transition-all active:scale-95">
                                                <i data-lucide="copy" size={14}></i> COPY ALL
                                            </button>
                                        </div>

                                        <div className="p-8 space-y-10">
                                            {/* Google Snippet Preview */}
                                            <div className="p-8 bg-slate-50 rounded-[2rem] border-2 border-white shadow-inner">
                                                <h4 className="text-[10px] font-black text-slate-400 uppercase mb-4 flex items-center gap-2"><i data-lucide="search" size={12}></i> Snippet Preview (Google Search)</h4>
                                                <p className="text-[#1a0dab] text-2xl font-medium leading-tight mb-2 hover:underline cursor-pointer tracking-tight">{generatedContent.meta.title}</p>
                                                <p className="text-[#4d5156] text-sm leading-relaxed border-l-4 border-indigo-200 pl-4 italic">{generatedContent.meta.description}</p>
                                            </div>

                                            {/* Outline Headings */}
                                            <div className="space-y-8 relative">
                                                <div className="absolute left-10 top-0 bottom-0 w-1 bg-slate-50 rounded-full"></div>
                                                
                                                {generatedContent.outline.map((item, i) => (
                                                    <div key={i} className="relative z-10 group">
                                                        <div className={`p-8 rounded-[2.5rem] border-2 transition-all hover:translate-x-1 ${item.tag === 'H1' ? 'bg-indigo-50 border-indigo-100 shadow-md' : 'bg-white border-slate-100 shadow-sm'}`}>
                                                            <div className="flex gap-5">
                                                                <span className={`px-2 py-1 rounded-lg text-[9px] font-black h-fit shadow-sm border ${item.tag === 'H1' ? 'bg-indigo-600 text-white border-indigo-400' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>{item.tag}</span>
                                                                <div className="flex-1">
                                                                    <h5 className={`font-black tracking-tight mb-4 ${item.tag === 'H1' ? 'text-3xl text-indigo-950' : 'text-xl text-slate-800'}`}>{item.text}</h5>
                                                                    
                                                                    <div className="bg-slate-50/80 p-5 rounded-2xl border border-slate-100 mb-4 shadow-inner text-[13px] leading-relaxed text-slate-700 font-medium">
                                                                        <span className="font-black text-rose-500 uppercase text-[9px] mr-2 block mb-1 underline decoration-rose-200 underline-offset-4">Hướng dẫn triển khai SEO:</span>
                                                                        {item.notes}
                                                                    </div>

                                                                    {item.subheadings && item.subheadings.length > 0 && (
                                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
                                                                            {item.subheadings.map((sub, si) => (
                                                                                <div key={si} className="bg-white p-3 px-4 rounded-xl border border-slate-50 text-xs font-bold text-slate-600 flex items-center gap-3 shadow-sm hover:border-indigo-100 transition-colors">
                                                                                    <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full shrink-0"></div> {sub}
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>

                                            {/* Extra Value */}
                                            <div className="bg-emerald-50 p-8 rounded-[3rem] border border-emerald-100 flex items-center gap-6 group">
                                                <div className="w-16 h-16 bg-emerald-500 rounded-3xl flex items-center justify-center text-white shadow-lg shrink-0 group-hover:rotate-12 transition-transform"><i data-lucide="sparkles" size={32}></i></div>
                                                <div>
                                                    <h4 className="font-black text-emerald-900 text-lg uppercase tracking-tighter italic mb-1">Mở rộng giá trị (EEAT & Helpful Content Booster)</h4>
                                                    <p className="text-emerald-800/80 text-xs font-bold leading-relaxed">{generatedContent.extra_value}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
